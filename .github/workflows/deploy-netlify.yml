name: Deploy Netlify

# Déploiement production via la CLI Netlify (optionnel).
# Prérequis : secrets NETLIFY_AUTH_TOKEN et NETLIFY_SITE_ID (voir docs/GITHUB_NETLIFY_SETUP.md).
#
# Par défaut : déclenchement manuel uniquement. Pour déployer à chaque push sur main, ajoutez :
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy production
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=frontend/dist --prod --message="Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
