# Crée un commit de version (VERSION + frontend npm) et pousse le tag vX.Y.Z sur GitHub.
# Déclenchement : Actions → Release tag → Run workflow → saisir X.Y.Z (ex. 1.0.0)

name: Release tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver X.Y.Z (le tag sera vX.Y.Z, ex. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps (pour npm version / lockfile)
        working-directory: frontend
        run: npm ci

      - name: Bump version, commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          bash scripts/release-version.sh "${{ github.event.inputs.version }}"
